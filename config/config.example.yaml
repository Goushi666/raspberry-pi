# 复制为 config.yaml 后填写真实值；config.yaml 已加入 .gitignore，不会被提交
# 接线：doc/树莓派完整接线说明.md ；BCM：pins.yaml
# MQTT 规划示例：doc/MQTT通信配置手册_树莓派与Web后端.md
# 环境变量：MQTT_HOST、MQTT_USERNAME、MQTT_PASSWORD、MQTT_CLIENT_ID、MQTT_DEVICE_ID

mqtt:
  host: your-instance.iot.gz.baidubce.com
  port: 1883
  client_id: your_raspberry_device_key
  # 百度 IoT：手册实例为 {IoTCoreId}/{DeviceKey} + 明文 Secret；若连接失败再按官方文档改 thingidp|MD5 方式
  username: "your_iot_core_id/your_raspberry_device_key"
  password: "your_device_secret"
  keepalive: 60
  device_id: ""
  publish_qos: 0
  subscribe_control_qos: 1
  topics:
    # 二选一或并存：若配置了 sensor_dht / sensor_light，则分主题发布（见手册 §3.1 §3.2）
    sensor_dht: sensor/dht
    sensor_light: sensor/light
    # 未配置分主题时，可仅用 sensor_data 合并上报（旧行为）
    # sensor_data: sensor/data
    vehicle_control:
      - car/control
      - arm/control

sensors:
  # dht11 / dht22：DATA 默认 BCM4（物理 Pin7），见 pins.yaml
  dht_model: dht22
  sample_interval_sec: 5
  bh1750:
    enabled: false
    i2c_bus: 1
    i2c_address: 0x23
    # J2 DVI：接 Pin1(3.3V) 或填 GPIO BCM 由程序拉高，见 doc/BH1750_树莓派使用指南.md
    dvi_bcm: null

# 视频：见《硬件端-Software通讯与对接说明》§5；enabled 为 true 时与 main.py 同进程起 MJPEG
video_stream:
  enabled: false
  bind: "0.0.0.0"
  port: 8080
  path: "/video_feed"
  camera_index: 0
  width: 1280
  height: 720
  fps: 24
  jpeg_quality: 94
  prefer_mjpg: true
  buffer_size: 1
  open_retry_sec: 2.0

# L298N 引脚（BCM）：见 config/pins.yaml（ena/in1/in2/enb/in3/in4）
motor:
  # 无新指令超过该秒数则自动停车（PWM 归零）
  command_timeout_sec: 5

features:
  # true：只跑 DHT22 + MQTT 发温湿度，不读光照、不初始化电机/GPIO、不订阅遥控主题
  # 要 MQTT 遥控小车：sensor_mqtt_only: false 且 motor_enabled: true
  sensor_mqtt_only: true
  motor_enabled: false
  vision_enabled: false
