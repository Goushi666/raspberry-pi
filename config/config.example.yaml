# 复制为 config.yaml 后填写真实值；config.yaml 已加入 .gitignore，不会被提交
# 完整接线：doc/树莓派完整接线说明.md ；BCM 引脚：pins.yaml
# 环境变量：MQTT_HOST、MQTT_USERNAME、MQTT_PASSWORD、MQTT_DEVICE_ID

mqtt:
  host: your-instance.iot.gz.baidubce.com
  port: 1883
  client_id: your_device_id
  username: "thingidp@your-instance|your_device_id|0|MD5"
  password: "your_device_secret"
  keepalive: 60
  device_id: ""
  publish_qos: 0
  topics:
    sensor_data: sensor/data
    # 仅当 sensor_mqtt_only: false 时才会订阅 vehicle_control
    vehicle_control: vehicle/control

sensors:
  # dht11 / dht22：DATA 默认 BCM4（物理 Pin7），见 pins.yaml
  dht_model: dht22
  sample_interval_sec: 5
  bh1750:
    enabled: false
    i2c_bus: 1
    i2c_address: 0x23
    # J2 DVI：接 Pin1(3.3V) 或填 GPIO BCM 由程序拉高，见 doc/BH1750_树莓派使用指南.md
    dvi_bcm: null

# 视频：见《硬件端-Software通讯与对接说明》§5；enabled 为 true 时与 main.py 同进程起 MJPEG
video_stream:
  enabled: false
  bind: "0.0.0.0"
  port: 8080
  path: "/mjpeg"
  camera_index: 0
  width: 640
  height: 480
  fps: 12
  jpeg_quality: 75

features:
  # true：只跑 DHT22 + MQTT 发温湿度，不读光照、不初始化电机/GPIO、不订阅遥控主题
  sensor_mqtt_only: true
  motor_enabled: false
  vision_enabled: false
